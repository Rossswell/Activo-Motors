<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Activo Motors</title>
    <style>
        /* Estilos simplificados para verificar funcionamiento */
        body { background: #080608; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #141114; border: 1px solid #2a222b; border-radius: 12px; padding: 15px; }
        .card img { width: 100%; border-radius: 8px; }
        .price { color: #e01a32; font-weight: bold; font-size: 1.2em; }
        .error-msg { background: #c0152a; padding: 10px; border-radius: 5px; margin: 20px; display: none; }
    </style>
</head>
<body>
    <img src="https://i.postimg.cc/1tc59dcg/activo-motors-logo-sin-fondo-Mesa-de-trabajo-1.png" height="80">
    <h1>Repuestos Toyota</h1>
    
    <div id="errorBox" class="error-msg">Error conectando con la base de datos</div>
    <div id="catalogo" class="grid">Cargando inventario...</div>

    <script>
        // TU URL ACTUALIZADA
        const API_URL = 'https://script.google.com/macros/s/AKfycbzhyedRcQ606Az8gOKmlOsMOiS87OtSQQQIjD2MNjsP_MbYeDQm2o3AqgFsO8cHWKJPEQ/exec';

        async function cargarProductos() {
            try {
                const resp = await fetch(`${API_URL}?accion=productos`);
                const productos = await resp.json();
                renderizar(productos);
            } catch (e) {
                document.getElementById('errorBox').style.display = 'block';
                document.getElementById('catalogo').innerHTML = '';
            }
        }

        function renderizar(lista) {
            const contenedor = document.getElementById('catalogo');
            if (lista.length === 0) {
                contenedor.innerHTML = '<p>No hay productos activos en el inventario.</p>';
                return;
            }
            contenedor.innerHTML = lista.map(p => `
                <div class="card">
                    <img src="${p.imagen}" alt="${p.nombre}">
                    <h3>${p.nombre}</h3>
                    <p>${p.descripcion}</p>
                    <p class="price">$${p.precio.toFixed(2)}</p>
                    <small>Stock: ${p.stock}</small>
                </div>
            `).join('');
        }

        window.onload = cargarProductos;
    </script>
</body>
</html>
